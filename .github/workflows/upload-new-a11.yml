name: Upload New A1.1 PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and upload PDF
        run: |
          # Download the PDF
          curl -L -o Gateway-to-Future-Deutsch-A1.1-Premium-Study-Material-1.pdf "https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/33327384/55a91be0-b071-4e29-ae18-96a681a891bc/Gateway-to-Future-Deutsch-A1.1-Premium-Study-Material-1.pdf"
          
          # Move to books folder
          mv Gateway-to-Future-Deutsch-A1.1-Premium-Study-Material-1.pdf books/
          
          # Verify file exists
          ls -la books/

      - name: Commit and push
        run: |
          git config --global user.name 'actions-user'
          git config --global user.email 'actions@github.com'
          git add books/
          git commit -m 'Upload new A1.1 Premium Study Material PDF'
          git push
