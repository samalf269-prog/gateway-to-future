name: Upload PDF Books

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create books directory
        run: mkdir -p books

      - name: Download A1.1 PDF
        run: curl -L -o "books/A1.1-Your-First-Step-to-Germany.pdf" "https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/33327384/ac2d516b-0e99-44a2-a617-899ae699f90d/Your-First-Step-to-Germany.pdf"

      - name: Download A1.2 PDF
        run: curl -L -o "books/A1.2-Building-Your-Foundation.pdf" "https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/33327384/a5623d8b-b951-4173-9bf7-59b676160def/Building-Your-Foundation.pdf"

      - name: Commit and push PDFs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add books/
          git commit -m "Add A1.1 and A1.2 PDF books" || echo "No changes to commit"
          git push
