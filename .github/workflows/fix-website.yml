name: Fix Website

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fix WhatsApp in courses.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' courses.html
          # Update A1 card PDF link to use books folder
          sed -i 's|books/A1.1-Your-First-Step-to-Germany.pdf|books/A1.1-Your-First-Step-to-Germany.pdf|g' courses.html
          # Update A2 Pre-order button to WhatsApp
          sed -i 's|<a href="#" class="btn-primary">Pre-order Now</a>|<a href="https://wa.me/4915228372894?text=Hi,%20I%20want%20to%20buy%20the%20A2%20course" class="btn-primary">Pre-order on WhatsApp</a>|g' courses.html
          # Update B1 Coming Soon button to WhatsApp
          sed -i 's|<a href="#" class="btn-primary">Coming Soon</a>|<a href="https://wa.me/4915228372894?text=Hi,%20I%27m%20interested%20in%20B1%20course" class="btn-primary">Join Waitlist on WhatsApp</a>|g' courses.html
          # Add WhatsApp button in nav
          sed -i 's|<li><a href="index.html#contact" class="btn-primary">Enroll Now</a></li>|<li><a href="https://wa.me/4915228372894" target="_blank" class="btn-primary">Chat on WhatsApp</a></li>|g' courses.html

      - name: Fix WhatsApp in index.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' index.html
          # Fix social media links
          sed -i 's|href="https://instagram.com"|href="https://instagram.com"|g' index.html
          sed -i 's|href="https://youtube.com"|href="https://youtube.com/@GatewayToFutureDE"|g' index.html
          sed -i 's|href="https://tiktok.com"|href="https://tiktok.com"|g' index.html

      - name: Fix WhatsApp in resources.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' resources.html

      - name: Fix WhatsApp in about.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' about.html

      - name: Fix WhatsApp in contact.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' contact.html

      - name: Fix WhatsApp in blog.html
        run: |
          sed -i 's|wa.me/491234567890|wa.me/4915228372894|g' blog.html

      - name: Commit and push website fixes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add *.html
          git commit -m "Fix WhatsApp number, social links, and course buttons" || echo "No changes"
          git push
