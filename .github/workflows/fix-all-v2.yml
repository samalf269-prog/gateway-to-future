name: Fix All Website Issues

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix courses.html - Add A1.2 course and update all courses
        run: |
          python3 -c "
import re

# Read courses.html
with open('courses.html', 'r', encoding='utf-8') as f:
    content = f.read()

# Define the new courses grid HTML with A1.1, A1.2, A2.1, B1
new_grid = '''        <div class=\"course-grid\">
            <div class=\"course-card glass\">
                <div class=\"level-badge a1\">A1</div>
                <h2>German A1.1</h2>
                <p>Perfect for absolute beginners. Includes 15 chapters with Hindi & English support.</p>
                <div class=\"price\">FREE</div>
                <a href=\"books/A1.1-Your-First-Step-to-Germany.pdf\" class=\"btn-primary\">Download PDF</a>
            </div>
            <div class=\"course-card glass\">
                <div class=\"level-badge a1\">A1</div>
                <h2>German A1.2</h2>
                <p>Continue your journey. Build on A1.1 with more vocabulary and grammar.</p>
                <div class=\"price\">\u20ac11.11</div>
                <a href=\"https://wa.me/4915228372894?text=Hi, I want to pre-order German A1.2\" class=\"btn-secondary\" target=\"_blank\">Pre-order Now</a>
            </div>
            <div class=\"course-card glass\">
                <div class=\"level-badge a2\">A2</div>
                <h2>German A2.1</h2>
                <p>Building your foundation. Advanced grammar and conversation skills.</p>
                <div class=\"price\">\u20ac11.11</div>
                <a href=\"https://wa.me/4915228372894?text=Hi, I want to pre-order German A2.1\" class=\"btn-secondary\" target=\"_blank\">Pre-order Now</a>
            </div>
            <div class=\"course-card glass\">
                <div class=\"level-badge b1\">B1</div>
                <h2>German B1</h2>
                <p>Intermediate level. Focus on Telc & Goethe certification prep.</p>
                <div class=\"price\">\u20ac11.11</div>
                <button class=\"btn-secondary\">Coming Soon</button>
            </div>
        </div>'''

# Replace the course-grid section
pattern = r'<div class=\"course-grid\">.*?</div>\s*</div>\s*</main>'
new_main = f'''        {new_grid}
    </main>'''

content = re.sub(pattern, new_main, content, flags=re.DOTALL)

with open('courses.html', 'w', encoding='utf-8') as f:
    f.write(content)
print('courses.html updated')
"

      - name: Fix about.html - Consistent nav
        run: |
          python3 -c "
import re

with open('about.html', 'r', encoding='utf-8') as f:
    content = f.read()

# Fix nav to match courses.html
old_nav_pattern = r'<nav[^>]*>.*?</nav>'
new_nav = '''    <nav class=\"glass-nav\">
        <div class=\"logo\">\u{1F1E9}\u{1F1EA} Gateway to Future</div>
        <ul class=\"nav-links\">
            <li><a href=\"index.html\">Home</a></li>
            <li><a href=\"courses.html\">Courses</a></li>
            <li><a href=\"index.html#about\">About</a></li>
            <li><a href=\"https://wa.me/4915228372894\" target=\"_blank\" class=\"btn-primary\">Chat on WhatsApp</a></li>
        </ul>
    </nav>'''

content = re.sub(old_nav_pattern, new_nav, content, flags=re.DOTALL)

with open('about.html', 'w', encoding='utf-8') as f:
    f.write(content)
print('about.html updated')
"

      - name: Fix blog.html - Add video lectures section and consistent nav
        run: |
          python3 -c "
import re

with open('blog.html', 'r', encoding='utf-8') as f:
    content = f.read()

# Fix nav
old_nav_pattern = r'<nav[^>]*>.*?</nav>'
new_nav = '''    <nav class=\"glass-nav\">
        <div class=\"logo\">\u{1F1E9}\u{1F1EA} Gateway to Future</div>
        <ul class=\"nav-links\">
            <li><a href=\"index.html\">Home</a></li>
            <li><a href=\"courses.html\">Courses</a></li>
            <li><a href=\"index.html#about\">About</a></li>
            <li><a href=\"https://wa.me/4915228372894\" target=\"_blank\" class=\"btn-primary\">Chat on WhatsApp</a></li>
        </ul>
    </nav>'''
content = re.sub(old_nav_pattern, new_nav, content, flags=re.DOTALL)

# Find main content area and add video lectures section before it
video_section = '''
    <section class=\"page-header\">
        <h1>Video <span>Lectures</span></h1>
        <p>Watch our German learning video lessons. From A1 basics to advanced grammar.</p>
    </section>
    <section class=\"video-grid\" style=\"padding: 2rem; max-width: 1200px; margin: 0 auto;\">
        <h2 style=\"text-align: center; margin-bottom: 2rem; color: #fff;\">German Learning Videos</h2>
        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;\">
            <div class=\"course-card glass\">
                <h3>A1.1 - Introduction to German</h3>
                <p>Learn the basics of German language - greetings, alphabet, and numbers.</p>
                <a href=\"https://www.youtube.com/results?search_query=learn+german+a1\" target=\"_blank\" class=\"btn-primary\">Watch on YouTube</a>
            </div>
            <div class=\"course-card glass\">
                <h3>A1.2 - Basic Grammar</h3>
                <p>Master basic German grammar - articles, verbs, and sentence structure.</p>
                <a href=\"https://www.youtube.com/results?search_query=german+grammar+a1+a2\" target=\"_blank\" class=\"btn-primary\">Watch on YouTube</a>
            </div>
            <div class=\"course-card glass\">
                <h3>A2.1 - Conversational German</h3>
                <p>Improve your German conversation skills for daily life.</p>
                <a href=\"https://www.youtube.com/results?search_query=learn+german+a2\" target=\"_blank\" class=\"btn-primary\">Watch on YouTube</a>
            </div>
            <div class=\"course-card glass\">
                <h3>Book Your Free Trial</h3>
                <p>Get a free 30-minute trial lesson with our expert German teacher.</p>
                <a href=\"https://wa.me/4915228372894?text=Hi, I want to book a free trial lesson\" target=\"_blank\" class=\"btn-primary\">Chat on WhatsApp</a>
            </div>
        </div>
    </section>
'''

# Insert video section after main tag
content = content.replace('<main class=\"container\">', f'<main class=\"container\">{video_section}')

with open('blog.html', 'w', encoding='utf-8') as f:
    f.write(content)
print('blog.html updated')
"

