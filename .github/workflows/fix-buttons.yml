name: Fix Buttons

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fix A2 and B1 buttons in courses.html
        run: |
          # Replace A2 Pre-order Now button with WhatsApp link
          sed -i 's|<button class="btn-secondary">Pre-order Now</button>|<a href="https://wa.me/4915228372894?text=Hi,%20I%20want%20to%20buy%20the%20A2%20course" target="_blank" class="btn-secondary">Pre-order on WhatsApp</a>|g' courses.html
          # Replace B1 Coming Soon button with WhatsApp link
          sed -i 's|<button class="btn-secondary">Coming Soon</button>|<a href="https://wa.me/4915228372894?text=Hi,%20I%27m%20interested%20in%20B1%20course" target="_blank" class="btn-secondary">Join Waitlist</a>|g' courses.html

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add courses.html
          git commit -m "Fix A2 and B1 course buttons to WhatsApp links" || echo "No changes"
          git push
